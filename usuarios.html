<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Usuarios Creados</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
    :root {
      color-scheme: dark;
      --bg-primary: #050924;
      --bg-secondary: #0b133d;
      --card-bg: rgba(12, 18, 64, 0.88);
      --card-border: rgba(255, 255, 255, 0.12);
      --text-primary: #f5f7ff;
      --text-muted: rgba(245, 247, 255, 0.72);
      --accent: #f5c000;
      --accent-strong: #ffe36d;
      --info: #4cc9ff;
      --warning: #ff914d;
      --danger: #ff6b6b;
      --success: #4ade80;
      --surface-soft: rgba(11, 17, 58, 0.72);
      --shadow-card: 0 25px 60px rgba(5, 12, 55, 0.45);
    }

    *, *::before, *::after {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: 'Poppins', 'Segoe UI', sans-serif;
      background: radial-gradient(circle at top, #101a52 0%, #070b2e 55%, #050724 100%);
      color: var(--text-primary);
      user-select: none;
      -webkit-text-size-adjust: 100%;
    }

    textarea { user-select: text; }

    button, input {
      font: inherit;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    #buscarCorreo { -webkit-tap-highlight-color: transparent; }

    .background {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    .shape {
      position: absolute;
      width: clamp(260px, 28vw, 360px);
      height: clamp(260px, 28vw, 360px);
      border-radius: 50%;
      background: radial-gradient(circle at center, rgba(245, 192, 0, 0.42), transparent 70%);
      filter: blur(42px);
      opacity: 0.6;
    }

    .shape:nth-child(1) {
      top: 8%;
      left: 6%;
    }

    .shape:nth-child(2) {
      bottom: 10%;
      right: 8%;
      background: radial-gradient(circle at center, rgba(76, 201, 255, 0.42), transparent 70%);
    }

    .card {
      position: relative;
      max-width: 1040px;
      margin: clamp(1.5rem, 4vw, 3rem) auto;
      background: linear-gradient(155deg, rgba(17, 25, 74, 0.92), rgba(7, 11, 46, 0.88));
      border-radius: 24px;
      padding: clamp(1.5rem, 3vw, 2.5rem);
      border: 1px solid var(--card-border);
      box-shadow: var(--shadow-card);
      color: var(--text-primary);
    }

    h1 {
      text-align: center;
      margin: 0 0 1.25rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      font-size: clamp(1.5rem, 1.2vw + 1.25rem, 2.1rem);
    }

    .filtros {
      margin: 1.5rem 0 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.65rem;
      flex-wrap: nowrap;
      overflow-x: auto;
      white-space: nowrap;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 0.35rem;
      justify-content: center;
    }

    .filtros button {
      padding-block: clamp(0.65rem, 1.1vw, 0.85rem);
      padding-inline: clamp(1rem, 2.4vw, 1.35rem);
      min-height: 46px;
      min-width: 46px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: linear-gradient(145deg, var(--accent-strong), var(--accent));
      color: #1b1600;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
      flex: 0 0 auto;
      font-size: clamp(0.9rem, 0.6vw + 0.75rem, 1.05rem);
      box-shadow: 0 12px 24px rgba(245, 192, 0, 0.32);
    }

    .filtros button:hover,
    .filtros button:focus-visible {
      transform: translateY(-1px);
      box-shadow: 0 18px 34px rgba(245, 192, 0, 0.42);
      outline: none;
    }

    .filtros button.active {
      filter: brightness(1.08);
    }

    #btnTodos { background: linear-gradient(145deg, rgba(255, 255, 255, 0.92), rgba(245, 247, 255, 0.8)); color: #10143b; }
    #btnActivos { background: linear-gradient(145deg, var(--info), #2196f3); color: #031d35; }
    #btnPorVencer { background: linear-gradient(145deg, var(--accent-strong), #ffb347); color: #2b1900; }
    #btnVencidos { background: linear-gradient(145deg, #ff8a8a, var(--danger)); color: #3f0404; }
    #btnDemo { background: linear-gradient(145deg, #6ffacc, #2dd4bf); color: #022b1f; }

    #mesVencidos,
    #diaVencidos {
      display: none;
      margin-left: 0.65em;
      padding: 0.6em 0.9em;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(9, 15, 58, 0.65);
      color: var(--text-primary);
      min-height: 46px;
      font-size: clamp(0.95rem, 0.4vw + 0.85rem, 1rem);
      flex: 0 0 auto;
    }

    #buscarCorreo {
      width: 100%;
      max-width: 640px;
      display: block;
      margin: 0 auto 1.25rem;
      padding: 0.85em 1.1em;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(10, 16, 56, 0.6);
      color: var(--text-primary);
      min-height: 48px;
      font-size: clamp(1rem, 0.6vw + 0.9rem, 1.15rem);
      outline: none;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    #buscarCorreo::placeholder {
      color: rgba(245, 247, 255, 0.45);
    }

    #buscarCorreo:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(245, 192, 0, 0.25);
    }

    #listaUsuarios { margin-top: 1.2rem; }

    .usuario {
      background: var(--surface-soft);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-left: 6px solid transparent;
      border-radius: 18px;
      padding: 0.95em 1.2em;
      margin-bottom: 0.85em;
      box-shadow: 0 8px 22px rgba(5, 12, 55, 0.28);
      color: var(--text-primary) !important;
    }

    .usuario * { color: inherit !important; }

    .usuario p {
      margin: 0.2em 0 !important;
      line-height: 1.25 !important;
    }

    .usuario.vencido { border-left-color: var(--danger); }
    .usuario.por-vencer { border-left-color: var(--warning); }

    .user-row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 0.5em 1.2em;
    }

    .user-details {
      display: grid;
      grid-auto-flow: row;
      row-gap: 0.35em;
      min-width: 260px;
      font-size: clamp(0.95rem, 0.4vw + 0.85rem, 1rem);
    }

    .user-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45em;
      align-items: center;
      justify-content: flex-end;
      min-width: 220px;
      justify-self: end;
    }

    .user-actions button {
      padding: 0.65em 1em;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(10, 16, 56, 0.75);
      color: var(--text-primary) !important;
      cursor: pointer;
      font-size: clamp(0.95rem, 0.3vw + 0.85rem, 1rem);
      min-height: 44px;
      min-width: 44px;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .user-actions button:hover,
    .user-actions button:focus-visible {
      transform: translateY(-1px);
      box-shadow: 0 12px 24px rgba(6, 14, 56, 0.35);
      outline: none;
      border-color: rgba(255, 255, 255, 0.28);
    }

    .user-actions .accent {
      background: linear-gradient(145deg, var(--info), #2a7ffe);
      color: #031d35 !important;
    }

    .user-actions .danger {
      background: linear-gradient(145deg, #ff8585, var(--danger));
      color: #320303 !important;
    }

    .user-actions .ghost {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-primary) !important;
    }

    .dot-demo {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 0 2px rgba(74, 222, 128, 0.25);
    }

    .tag {
      display: inline-block;
      font-size: 0.75rem;
      padding: 0.2em 0.65em;
      border-radius: 999px;
      background: rgba(245, 247, 255, 0.1);
      color: var(--text-primary) !important;
      margin-left: 0.35em;
      border: 1px solid rgba(255, 255, 255, 0.18);
    }

    .tag.locked {
      background: rgba(255, 180, 102, 0.1);
      color: #ffd0a8 !important;
      border-color: rgba(255, 180, 102, 0.32);
    }

    .menu-contextual {
      position: fixed;
      z-index: 9999;
      background: rgba(11, 16, 58, 0.96);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 20px;
      padding: 0.65em;
      min-width: 260px;
      box-shadow: 0 22px 48px rgba(5, 12, 55, 0.5);
      backdrop-filter: blur(18px);
      animation: pop 0.12s ease-out;
      color: var(--text-primary);
    }

    @keyframes pop {
      from { transform: scale(0.97); opacity: 0.8; }
      to { transform: scale(1); opacity: 1; }
    }

    @media (prefers-reduced-motion: reduce) {
      .menu-contextual { animation: none !important; }
    }

    .menu-contextual h4 {
      font-size: 0.95rem;
      margin: 0.25em 0.35em 0.6em;
      font-weight: 600;
      color: var(--text-muted) !important;
    }

    .menu-contextual .group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.45em;
      margin-bottom: 0.6em;
    }

    .menu-contextual button {
      padding: 0.7em 0.9em;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(13, 20, 66, 0.82);
      color: var(--text-primary) !important;
      cursor: pointer;
      font-size: clamp(0.95rem, 0.3vw + 0.85rem, 1rem);
      min-height: 44px;
      min-width: 44px;
      text-align: left;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .menu-contextual button:hover,
    .menu-contextual button:focus-visible {
      transform: translateY(-1px);
      box-shadow: 0 12px 24px rgba(6, 14, 56, 0.35);
      outline: none;
      border-color: rgba(255, 255, 255, 0.25);
    }

    .menu-contextual .accent {
      background: linear-gradient(145deg, var(--info), #2a7ffe);
      color: #031d35 !important;
    }

    .menu-contextual .danger {
      background: linear-gradient(145deg, #ff8585, var(--danger));
      color: #320303 !important;
    }

    @media (max-width: 720px) {
      .card { margin: 1.25rem 0.75rem; padding: 1.35rem; }
      .filtros { gap: 0.5em; justify-content: flex-start; }
      .filtros button { font-size: 1rem; }
      #buscarCorreo { font-size: 1rem; }
      .user-row { grid-template-columns: 1fr; gap: 0.55em; }
      .user-actions { justify-self: start; justify-content: flex-start; }
      .menu-contextual .group { grid-template-columns: 1fr; }
    }

    button:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>

</head>
<body>
  <div class="background">
    <div class="shape"></div>
    <div class="shape"></div>
  </div>

  <div class="card">
    <h1>Usuarios Creados</h1>

    <div class="filtros">
      <button id="btnTodos" class="active">Todos</button>
      <button id="btnActivos">Activos</button>
      <button id="btnPorVencer">Por vencer</button>
      <button id="btnVencidos">Vencidos</button>
      <button id="btnDemo">Demo</button>
      <input type="month" id="mesVencidos" title="Filtrar mes de cuentas vencidas" />
      <input type="number" id="diaVencidos" min="1" max="31" placeholder="D¨ªa" title="Filtrar d¨ªa de cuentas vencidas" />
    </div>

    <input type="text" id="buscarCorreo" placeholder="Buscar por correo electr¨®nico" />

    <div id="listaUsuarios"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, get, update, remove, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

     const firebaseConfig = {
      apiKey: "AIzaSyADcEYKamrewxL8CDA8NmAuRZjp8eZ2XzY",
      authDomain: "femon-play.firebaseapp.com",
      databaseURL: "femon-play-default-rtdb.firebaseio.com",
      projectId: "femon-play",
      storageBucket: "femon-play.firebasestorage.app",
      messagingSenderId: "887768250224",
      appId: "1:63456783638:android:1e18d5484b58fc1411f437"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const database = getDatabase(app);

    const listaUsuarios = document.getElementById("listaUsuarios");
    const buscarCorreo = document.getElementById("buscarCorreo");
    const btnTodos = document.getElementById("btnTodos");
    const btnActivos = document.getElementById("btnActivos");
    const btnPorVencer = document.getElementById("btnPorVencer");
    const btnVencidos = document.getElementById("btnVencidos");
    const btnDemo = document.getElementById("btnDemo");
    const mesVencidos = document.getElementById("mesVencidos");
    const diaVencidos = document.getElementById("diaVencidos");

    let adminUID = null;
    let usuariosData = [];

    onAuthStateChanged(auth, user => {
      if (user) {
        adminUID = user.uid;
        cargarUsuarios();
      } else {
        alert("No est¨¢s autenticado. Redirigiendo...");
        window.location.href = "index.html";
      }
    });

    function parseFecha(str) {
      try {
        if (!str || typeof str !== "string") return null;
        // Formatos soportados: "dd/mm/yyyy hh:mm:ss" o "dd/mm/yyyy"
        const [fecha, hora = "00:00:00"] = str.trim().split(" ");
        const [dia, mes, anio] = fecha.split("/").map(v => v.padStart(2,"0"));
        const h = hora.split(":");
        while (h.length < 3) h.push("00");
        const [hh, mm, ss] = h;
        const iso = `${anio}-${mes}-${dia}T${hh}:${mm}:${ss}`;
        const d = new Date(iso);
        return isNaN(d.getTime()) ? null : d;
      } catch {
        return null;
      }
    }

    function pad2(n){ return n.toString().padStart(2,"0"); }
    function formatFecha(d) {
      return `${pad2(d.getDate())}/${pad2(d.getMonth()+1)}/${d.getFullYear()} ${pad2(d.getHours())}:${pad2(d.getMinutes())}:${pad2(d.getSeconds())}`;
    }
    function ahoraAsuncion() {
      return new Date(new Date().toLocaleString("en-US", { timeZone: "America/Asuncion" }));
    }
    function addMonthsPreservingDay(baseDate, months) {
      const d = new Date(baseDate.getTime());
      const originalDay = d.getDate();
      const h = d.getHours(), m = d.getMinutes(), s = d.getSeconds();
      const target = new Date(d.getFullYear(), d.getMonth(), d.getDate(), h, m, s);
      const targetMonth = d.getMonth() + months;
      target.setMonth(targetMonth);
      if (target.getMonth() !== ((targetMonth % 12) + 12) % 12) {
        return new Date(target.getFullYear(), ((targetMonth % 12) + 12) % 12 + 1, 0, h, m, s);
      }
      if (target.getDate() !== originalDay) {
        return new Date(target.getFullYear(), target.getMonth() + 1, 0, h, m, s);
      }
      return target;
    }

    async function cargarUsuarios() {
      const snap = await get(ref(database, "usuarios"));
      usuariosData = [];
      if (!snap.exists()) {
        listaUsuarios.innerHTML = "<p>No se encontraron usuarios.</p>";
        return;
      }
      const all = snap.val();
      for (const uid in all) {
        const u = all[uid];
        // Incluir bloqueados: si tiene email O mailblock, y pertenece al admin
        if (u && u.idv === adminUID && (u.email || u.mailblock)) {
          const creacion = parseFecha(u.creacion);
          // Compat: algunos nodos usan diferentes claves para vencimiento
          const vencStr = u.benzymyentou || u.benzymaentou || u.vencimiento || u.vto || null;
          const vencimiento = parseFecha(vencStr);
          const isDemo = (creacion && vencimiento) ? ((vencimiento - creacion) < (5 * 60 * 60 * 1000)) : false;

          const rawEmail = u.email || null;
          const mailblock = u.mailblock || null;
          const displayEmail = rawEmail || mailblock || "";
          const bloqueado = !!mailblock && !rawEmail;

          usuariosData.push({
            uid,
            email: rawEmail,
            mailblock,
            displayEmail,
            bloqueado,
            password: u.password || "",
            creacion,
            vencimiento,
            isDemo
          });
        }
      }
      renderUsuarios("todos");
    }

    function renderUsuarios(filtro) {
      listaUsuarios.innerHTML = "";
      const now = ahoraAsuncion();
      const ms3d = 3 * 24 * 60 * 60 * 1000;

      let selYear = null, selMonth = null, selDia = null;
      if (mesVencidos.value) {
        const [y,m] = mesVencidos.value.split("-");
        selYear = parseInt(y,10);
        selMonth = parseInt(m,10);
      }
      selDia = parseInt(diaVencidos.value, 10) || null;

      const q = buscarCorreo.value.toLowerCase();

      const filtrados = usuariosData
        .filter(u => {
          const exp = u.vencimiento;
          if (!exp) return false;
          const diff = exp - now;
          let ok;
          switch (filtro) {
            case "activos": ok = diff > 0; break;
            case "porVencer": ok = diff > 0 && diff <= ms3d; break;
            case "vencidos": ok = diff <= 0; break;
            case "demo": ok = u.isDemo === true; break;
            default: ok = true;
          }
          if (!ok) return false;

          if (filtro === "vencidos" && selYear && selMonth) {
            if (selDia) {
              return exp.getFullYear() === selYear && (exp.getMonth()+1) === selMonth && exp.getDate() === selDia;
            }
            return exp.getFullYear() === selYear && (exp.getMonth()+1) === selMonth;
          }
          return true;
        })
        .filter(u => (u.displayEmail || "").toLowerCase().includes(q));

      if (!filtrados.length) {
        listaUsuarios.innerHTML = "<p>No hay usuarios para ese filtro.</p>";
        return;
      }

      filtrados.forEach(u => {
        const div = document.createElement("div");
        const nowLocal = ahoraAsuncion();
        const diff = u.vencimiento - nowLocal;
        if (diff <= 0) div.classList.add("usuario", "vencido");
        else if (diff <= (3*24*60*60*1000)) div.classList.add("usuario", "por-vencer");
        else div.classList.add("usuario");

        const row = document.createElement("div");
        row.className = "user-row";

        /* ===== Bloque de detalles (todo junto) ===== */
        const details = document.createElement("div");
        details.className = "user-details";

        const emailP = document.createElement("p");
        emailP.style.margin = "0";
        emailP.textContent = `Correo: ${u.displayEmail}`;
        if (u.isDemo) {
          const dot = document.createElement("span");
          dot.className = "dot-demo";
          dot.title = "Cuenta demo";
          emailP.appendChild(document.createTextNode(" "));
          emailP.appendChild(dot);

          const tag = document.createElement("span");
          tag.className = "tag";
          tag.textContent = "Demo";
          emailP.appendChild(document.createTextNode(" "));
          emailP.appendChild(tag);
        }
        if (u.bloqueado) {
          const tagB = document.createElement("span");
          tagB.className = "tag locked";
          tagB.textContent = "Bloqueado";
          emailP.appendChild(document.createTextNode(" "));
          emailP.appendChild(tagB);
        }

        const vencP = document.createElement("p");
        vencP.style.margin = "0";
        vencP.textContent = `Vencimiento: ${u.vencimiento ? formatFecha(u.vencimiento) : "Inv¨¢lida"}`;

        const passP = document.createElement("p");
        passP.style.margin = "0";
        passP.textContent = `Contrase09a: ${u.password || ""}`;

        const creP = document.createElement("p");
        creP.style.margin = "0";
        creP.textContent = `Creaci¨®n: ${u.creacion ? formatFecha(u.creacion) : "Inv¨¢lida"}`;

        details.appendChild(emailP);
        details.appendChild(vencP);
        details.appendChild(passP);
        details.appendChild(creP);

        /* ===== Acciones ===== */
        const actions = document.createElement("div");
        actions.className = "user-actions";

        const btnBlock = document.createElement("button");
        if (u.bloqueado) {
          btnBlock.textContent = "Desbloquear";
          btnBlock.className = "accent";
          btnBlock.addEventListener("click", () => desbloquearUsuario(u.uid));
        } else {
          btnBlock.textContent = "Bloquear";
          btnBlock.className = "danger";
          btnBlock.addEventListener("click", () => bloquearUsuario(u.uid));
        }

        const btnCopy = document.createElement("button");
        btnCopy.textContent = "Copiar Usuario";
        btnCopy.className = "ghost";
        btnCopy.addEventListener("click", () => copiarUsuario(u.displayEmail, u.password));

        const btnMore = document.createElement("button");
        btnMore.textContent = "6å8";
        btnMore.title = "M¨¢s acciones";
        btnMore.addEventListener("click", (e) => mostrarOpciones(e, u));

        actions.appendChild(btnBlock);
        actions.appendChild(btnCopy);
        actions.appendChild(btnMore);

        /* ===== Ensamblado ===== */
        row.appendChild(details);
        row.appendChild(actions);

        const hr = document.createElement("hr");
        hr.style.border = "none";
        hr.style.borderTop = "1px solid #eef2f7";
        hr.style.margin = ".4em 0 0";

        div.appendChild(row);
        div.appendChild(hr);

        /* Men¨² contextual */
        div.addEventListener("contextmenu", e => mostrarOpciones(e, u));

        listaUsuarios.appendChild(div);
      });
    }

    // Botones de filtro
    [btnTodos, btnActivos, btnPorVencer, btnVencidos, btnDemo].forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".filtros button").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");

        if (btn.id === "btnVencidos") {
          mesVencidos.style.display = "inline-block";
        } else {
          mesVencidos.value = "";
          mesVencidos.style.display = "none";
          diaVencidos.value = "";
          diaVencidos.style.display = "none";
        }
        const map = { btnTodos: "todos", btnActivos: "activos", btnPorVencer: "porVencer", btnVencidos: "vencidos", btnDemo: "demo" };
        renderUsuarios(map[btn.id]);
      });
    });

    mesVencidos.addEventListener("change", () => {
      if (document.querySelector(".filtros button.active").id === "btnVencidos") {
        if (mesVencidos.value) {
          diaVencidos.style.display = "inline-block";
        } else {
          diaVencidos.value = "";
          diaVencidos.style.display = "none";
        }
        renderUsuarios("vencidos");
      }
    });

    diaVencidos.addEventListener("input", () => {
      if (document.querySelector(".filtros button.active").id === "btnVencidos") {
        renderUsuarios("vencidos");
      }
    });

    buscarCorreo.addEventListener("input", () => {
      const activo = document.querySelector(".filtros button.active").id;
      const map = { btnTodos: "todos", btnActivos: "activos", btnPorVencer: "porVencer", btnVencidos: "vencidos", btnDemo: "demo" };
      renderUsuarios(map[activo]);
    });

    // ==== Men¨² contextual y acciones ====
    function crearBotonMenu(texto, clase, handler) {
      const b = document.createElement("button");
      if (clase) b.className = clase;
      b.textContent = texto;
      b.addEventListener("click", handler);
      return b;
    }

    function mostrarOpciones(e, u) {
      e.preventDefault();
      document.querySelectorAll(".menu-contextual").forEach(m => m.remove());

      const menu = document.createElement("div");
      menu.classList.add("menu-contextual");

      const titulo = document.createElement("h4");
      titulo.textContent = "Acciones";
      menu.appendChild(titulo);

      // Toggle Bloquear/Desbloquear
      if (u.bloqueado) {
        menu.appendChild(crearBotonMenu("Desbloquear usuario", "accent", () => { desbloquearUsuario(u.uid); menu.remove(); }));
      } else {
        menu.appendChild(crearBotonMenu("Bloquear usuario", "danger", () => { bloquearUsuario(u.uid); menu.remove(); }));
      }

      const sub = document.createElement("h4");
      sub.textContent = "Renovar (consume cr¨¦ditos)";
      sub.style.marginTop = "0";
      sub.style.fontWeight = "600";
      menu.appendChild(sub);

      const group = document.createElement("div");
      group.className = "group";
      group.appendChild(crearBotonMenu("1 mes (-1)", "accent", () => renovarCuenta(u.uid, 1)));
      group.appendChild(crearBotonMenu("3 meses (-3)", "accent", () => renovarCuenta(u.uid, 3)));
      group.appendChild(crearBotonMenu("6 meses (-6)", "accent", () => renovarCuenta(u.uid, 6)));
      group.appendChild(crearBotonMenu("12 meses (-12)", "accent", () => renovarCuenta(u.uid, 12)));
      menu.appendChild(group);

      menu.appendChild(crearBotonMenu("Reiniciar Device ID", "", () => eliminarDeviceID(u.uid)));
      menu.appendChild(crearBotonMenu("Copiar Usuario", "", () => copiarUsuario(u.displayEmail, u.password)));
      menu.appendChild(crearBotonMenu("Eliminar Cuenta", "danger", () => eliminarCuenta(u.uid)));

      document.body.appendChild(menu);

      const vw = window.innerWidth, vh = window.innerHeight;
      const rectW = 320, rectH = 350;
      let x = e.clientX || (e.touches && e.touches[0]?.clientX) || 16;
      let y = e.clientY || (e.touches && e.touches[0]?.clientY) || 16;
      if (x + rectW > vw) x = vw - rectW - 8;
      if (y + rectH > vh) y = vh - rectH - 8;
      menu.style.left = x + "px";
      menu.style.top = y + "px";

      const close = () => menu.remove();
      setTimeout(() => {
        document.addEventListener("click", close, { once: true });
        window.addEventListener("blur", close, { once: true });
        window.addEventListener("resize", close, { once: true });
        window.addEventListener("scroll", close, { once: true });
      }, 0);
    }

    // === Cr¨¦ditos (se mantienen igual) ===
    async function descontarCreditosAtomico(needed = 1) {
      const adminRef = ref(database, `Admin/${adminUID}/limiteUsuarios`);
      try {
        const res = await runTransaction(adminRef, (current) => {
          const cur = parseInt(current, 10) || 0;
          if (cur < needed) return; // aborta la transacci¨®n
          return cur - needed;
        });
        return res.committed === true;
      } catch { return false; }
    }

    async function reembolsarCreditosAtomico(amt = 1) {
      const adminRef = ref(database, `Admin/${adminUID}/limiteUsuarios`);
      try {
        await runTransaction(adminRef, (current) => {
          const cur = parseInt(current, 10) || 0;
          return cur + amt;
        });
        return true;
      } catch { return false; }
    }

    async function renovarCuenta(uid, meses) {
      try {
        if (![1,3,6,12].includes(meses)) {
          alert("Meses inv¨¢lidos.");
          return;
        }
        // Descontar cr¨¦ditos primero (at¨®mico)
        const ok = await descontarCreditosAtomico(meses);
        if (!ok) {
          alert("No tienes cr¨¦ditos suficientes para renovar.");
          return;
        }
        // Leer usuario actualizado
        const uref = ref(database, `usuarios/${uid}`);
        const usnap = await get(uref);
        if (!usnap.exists()) {
          await reembolsarCreditosAtomico(meses);
          alert("Usuario no encontrado. Se reembolsaron los cr¨¦ditos.");
          return;
        }
        const u = usnap.val();
        const now = ahoraAsuncion();
        const vencStr = u.benzymyentou || u.benzymaentou || u.vencimiento || u.vto || null;
        const actualVenc = parseFecha(vencStr);

        // Regla: si ya venci¨® ¡ú base = hoy; si no venci¨® ¡ú base = fecha de vencimiento
        const base = (actualVenc && actualVenc.getTime() > now.getTime()) ? actualVenc : now;
        const nuevoVenc = addMonthsPreservingDay(base, meses);
        const nuevaCadena = formatFecha(nuevoVenc);

        try {
          // Guardamos en la misma clave que ya usas (compatibilidad)
          await update(uref, { benzymyentou: nuevaCadena });
        } catch {
          await reembolsarCreditosAtomico(meses);
          alert("Error al renovar. No se aplic¨® el cambio y se reembolsaron los cr¨¦ditos.");
          return;
        }
        alert(`Renovada por ${meses} mes(es) hasta ${nuevaCadena}`);
        cargarUsuarios();
      } catch {
        alert("Error inesperado al renovar.");
      }
    }

    async function eliminarDeviceID(uid) {
      try {
        await remove(ref(database, `usuarios/${uid}/deviceID`));
        alert("Device ID eliminado.");
        cargarUsuarios();
      } catch {
        alert("Error al eliminar Device ID.");
      }
    }

    function copiarUsuario(email, pass) {
      const ta = document.createElement("textarea");
      ta.value = `Correo: ${email}\nContrase09a: ${pass}`;
      document.body.appendChild(ta);
      ta.select();
      const ok = document.execCommand("copy");
      document.body.removeChild(ta);
      ok ? alert("Copiado al portapapeles.") : alert("Error al copiar.");
    }

    async function eliminarCuenta(uid) {
      if (!confirm("07Eliminar cuenta?")) return;
      try {
        await remove(ref(database, `usuarios/${uid}/email`));
        alert("Cuenta eliminada (email).");
        cargarUsuarios();
      } catch {
        alert("Error al eliminar cuenta.");
      }
    }

    // === Bloquear/Desbloquear usuario (at¨®mico) ===
    async function bloquearUsuario(uid) {
      try {
        const uref = ref(database, `usuarios/${uid}`);
        const res = await runTransaction(uref, (current) => {
          if (!current) return current;
          // Si ya est¨¢ bloqueado, no hacer nada
          if (current.mailblock && !current.email) return current;
          // S¨®lo bloqueamos si existe email
          if (current.email) {
            current.mailblock = current.email; // guardar temporal
            delete current.email;              // borrar campo email
          }
          return current;
        });
        if (res.committed) {
          alert("Usuario bloqueado.");
          cargarUsuarios();
        } else {
          alert("No se pudo bloquear (quiz¨¢ ya estaba bloqueado o no existe email).");
        }
      } catch (e) {
        alert("Error al bloquear usuario.");
      }
    }

    async function desbloquearUsuario(uid) {
      try {
        const uref = ref(database, `usuarios/${uid}`);
        const res = await runTransaction(uref, (current) => {
          if (!current) return current;
          // Desbloquear s¨®lo si existe mailblock
          if (current.mailblock) {
            current.email = current.mailblock; // restaurar
            delete current.mailblock;          // borrar tempora
          }
          return current;
        });
        if (res.committed) {
          alert("Usuario desbloqueado.");
          cargarUsuarios();
        } else {
          alert("No se pudo desbloquear (no hab¨ªa mailblock).");
        }
      } catch (e) {
        alert("Error al desbloquear usuario.");
      }
    }

    // Exponer funciones
    window.renovarCuenta = renovarCuenta;
    window.eliminarDeviceID = eliminarDeviceID;
    window.copiarUsuario = copiarUsuario;
    window.eliminarCuenta = eliminarCuenta;
    window.bloquearUsuario = bloquearUsuario;
    window.desbloquearUsuario = desbloquearUsuario;
  </script>
</body>
