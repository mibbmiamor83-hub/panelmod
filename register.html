<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear cuenta</title>
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="manifest" href="site.webmanifest">

    <style>
        :root {
            --bg-primary: #070b2e;
            --bg-secondary: #11194a;
            --accent: #f5c000;
            --accent-strong: #ffe36d;
            --text-primary: #f5f7ff;
            --text-muted: rgba(245, 247, 255, 0.7);
            --card-shadow: 0 25px 60px rgba(5, 12, 55, 0.45);
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 16px;
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top, #101a52 0%, #070b2e 60%, #050724 100%);
            color: var(--text-primary);
            position: relative;
            overflow: hidden;
        }

        .background {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .shape {
            position: absolute;
            width: clamp(280px, 40vw, 420px);
            height: clamp(280px, 40vw, 420px);
            border-radius: 50%;
            background: radial-gradient(circle at center, rgba(245, 192, 0, 0.42), transparent 70%);
            filter: blur(42px);
            opacity: 0.6;
        }

        .shape:first-child {
            top: -10%;
            left: -10%;
        }

        .shape:last-child {
            bottom: -12%;
            right: -15%;
            background: radial-gradient(circle at center, rgba(76, 201, 255, 0.42), transparent 70%);
        }

        .auth-card {
            position: relative;
            z-index: 1;
            width: min(420px, 100%);
            background: linear-gradient(155deg, rgba(17, 25, 74, 0.92), rgba(7, 11, 46, 0.88));
            border-radius: 24px;
            padding: clamp(32px, 5vw, 44px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: var(--card-shadow);
            overflow: hidden;
        }

        .auth-card::before {
            content: "";
            position: absolute;
            inset: 12% auto auto -35%;
            width: 70%;
            aspect-ratio: 1 / 1;
            background: radial-gradient(circle at center, rgba(255, 255, 255, 0.12), transparent 68%);
            pointer-events: none;
        }

        .auth-card header {
            margin-bottom: 28px;
        }

        .auth-card h1 {
            margin: 0;
            font-size: clamp(1.75rem, 3vw, 2.25rem);
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        .auth-card p {
            margin: 6px 0 0;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        form {
            display: grid;
            gap: 20px;
        }

        label {
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(10, 16, 56, 0.65);
            color: var(--text-primary);
            font-size: 1rem;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        input::placeholder {
            color: rgba(245, 247, 255, 0.45);
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(245, 192, 0, 0.28);
        }

        button {
            border: none;
            border-radius: 18px;
            padding: 16px 20px;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            background: linear-gradient(145deg, var(--accent-strong), var(--accent));
            color: #1b1600;
            cursor: pointer;
            box-shadow: 0 18px 32px rgba(245, 192, 0, 0.38);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        button:hover,
        button:focus-visible {
            transform: translateY(-2px);
            box-shadow: 0 24px 42px rgba(245, 192, 0, 0.45);
            outline: none;
        }

        .auth-footer {
            margin-top: 18px;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .auth-footer a {
            color: var(--accent-strong);
            font-weight: 600;
            text-decoration: none;
        }

        .auth-footer a:hover,
        .auth-footer a:focus-visible {
            text-decoration: underline;
        }

        @media (max-width: 540px) {
            .auth-card {
                border-radius: 20px;
                padding: 28px 20px;
            }
        }
    </style>

    <script type="module" defer src="register.js"></script>
    <script type="module" defer src="google.js"></script>
    <script type="module" defer src="facebook.js"></script>
</head>

<body>
    <div class="background">
        <div class="shape"></div>
        <div class="shape"></div>
    </div>

    <main class="auth-card">
        <header>
            <h1>Crea tu cuenta</h1>
            <p>Administra clientes y vendedores desde un panel renovado.</p>
        </header>

        <form>
            <div>
                <label for="email">Correo electrónico</label>
                <input type="email" placeholder="usuario@ejemplo.com" id="email" required>
            </div>
            <div>
                <label for="password">Contraseña</label>
                <input type="password" placeholder="Mínimo 6 caracteres" id="password" required>
            </div>
            <button id="submit" type="submit">Crear cuenta</button>
        </form>

        <p class="auth-footer">¿Ya tienes una cuenta? <a href="index.html">Inicia sesión</a></p>
    </main>
</body>

</html>
